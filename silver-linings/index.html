<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Silver Linings — Save the Date</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Inter:wght@200;300&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-deep: #08080c;
      --silver-1: #f2f2f7;
      --silver-2: #d8d8e2;
      --silver-3: #c0c0cc;
      --silver-4: #e8e8f0;
      --silver-5: #a8a8b4;
      --champagne: #d4c5a9;
      --champagne-light: #ede0cc;
      --text-muted: #8a8a96;
      --transition-slow: 800ms cubic-bezier(0.22, 0.61, 0.36, 1);
      --transition-medium: 500ms cubic-bezier(0.22, 0.61, 0.36, 1);
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg-deep);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      cursor: default;
      user-select: none;
      -webkit-user-select: none;
    }

    /* ── Fireworks Canvas ── */
    #fireworks {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    /* ── Ambient Particles (floating silver dust) ── */
    .particle {
      position: fixed;
      pointer-events: none;
      z-index: 1;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(232,232,240,0.8) 0%, rgba(200,200,212,0) 70%);
      animation: floatUp var(--dur) var(--delay) linear forwards;
      opacity: 0;
    }

    @keyframes floatUp {
      0%   { opacity: 0; transform: translateY(0) scale(0.5); }
      10%  { opacity: 0.7; }
      80%  { opacity: 0.3; }
      100% { opacity: 0; transform: translateY(-100vh) scale(1.2); }
    }

    /* ── Main Content ── */
    .container {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      padding: 2rem;
      text-align: center;
    }

    /* ── Decorative Top Rule ── */
    .top-rule {
      width: 1px;
      height: 60px;
      background: linear-gradient(to bottom,
        transparent 0%,
        rgba(200,200,212,0.4) 30%,
        rgba(240,240,245,0.7) 50%,
        rgba(200,200,212,0.4) 70%,
        transparent 100%
      );
      margin-bottom: 2.5rem;
      animation: rulePulse 4s ease-in-out infinite;
    }

    @keyframes rulePulse {
      0%, 100% { opacity: 0.5; }
      50%      { opacity: 1; }
    }

    /* ── Title: "Silver Linings" ── */
    .title {
      font-family: 'Playfair Display', 'Cormorant Garamond', Georgia, serif;
      font-weight: 500;
      font-size: clamp(3rem, 8vw, 7.5rem);
      line-height: 1.08;
      letter-spacing: -0.01em;
      margin-bottom: 0.15em;

      /* Metallic silver gradient */
      background: linear-gradient(
        175deg,
        #f8f8fc 0%,
        #e0e0ea 12%,
        #f4f4f8 25%,
        #c8c8d4 38%,
        #ececf4 50%,
        #b8b8c4 62%,
        #e4e4ee 75%,
        #d0d0da 88%,
        #b0b0bc 100%
      );
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;

      /* Subtle shimmer animation — light catching polished silver */
      animation: silverShimmer 5s ease-in-out infinite;
      background-size: 100% 200%;
    }

    @keyframes silverShimmer {
      0%, 100% { background-position: 0% 0%; }
      50%      { background-position: 0% 100%; }
    }

    /* ── Subtitle / Year ── */
    .subtitle {
      font-family: 'Inter', system-ui, sans-serif;
      font-weight: 200;
      font-size: clamp(0.7rem, 1.4vw, 0.95rem);
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: var(--champagne);
      margin-bottom: 3rem;
    }

    /* ── Quote ── */
    .quote {
      font-family: 'Cormorant Garamond', 'Playfair Display', Georgia, serif;
      font-weight: 400;
      font-style: italic;
      font-size: clamp(1.1rem, 2.2vw, 1.7rem);
      line-height: 1.55;
      color: var(--silver-2);
      max-width: 28em;
      margin-bottom: 2.5rem;
      opacity: 0.85;
    }

    .quote em {
      font-style: normal;
    }

    .quote .highlight {
      color: var(--champagne-light);
      font-weight: 500;
      font-style: normal;
    }

    /* ── Date ── */
    .date-block {
      margin-bottom: 2rem;
    }

    .date-label {
      font-family: 'Inter', system-ui, sans-serif;
      font-weight: 200;
      font-size: clamp(0.6rem, 1.1vw, 0.78rem);
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 0.6rem;
    }

    .date-main {
      font-family: 'Playfair Display', 'Cormorant Garamond', Georgia, serif;
      font-weight: 500;
      font-size: clamp(2.2rem, 5vw, 4rem);
      line-height: 1.12;
      letter-spacing: 0.02em;
      color: var(--silver-2);
    }

    .date-divider {
      display: inline-block;
      width: 2rem;
      height: 1px;
      background: rgba(180,180,192,0.5);
      vertical-align: middle;
      margin: 0 0.15em;
    }

    /* ── Bottom Rule ── */
    .bottom-rule {
      width: 80px;
      height: 1px;
      background: linear-gradient(to right,
        transparent 0%,
        rgba(200,200,212,0.5) 40%,
        rgba(240,240,245,0.4) 50%,
        rgba(200,200,212,0.5) 60%,
        transparent 100%
      );
      margin-bottom: 1.8rem;
    }

    /* ── Footer ── */
    .footer-text {
      font-family: 'Inter', system-ui, sans-serif;
      font-weight: 200;
      font-size: clamp(0.65rem, 1.2vw, 0.8rem);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-muted);
      opacity: 0.7;
    }

    /* ── Entrance Animation ── */
    .fade-in {
      opacity: 0;
      animation: fadeRise 1.4s var(--transition-slow) forwards;
    }

    .fade-in-1 { animation-delay: 0.1s; }
    .fade-in-2 { animation-delay: 0.3s; }
    .fade-in-3 { animation-delay: 0.55s; }
    .fade-in-4 { animation-delay: 0.8s; }
    .fade-in-5 { animation-delay: 1.0s; }
    .fade-in-6 { animation-delay: 1.2s; }
    .fade-in-7 { animation-delay: 1.4s; }

    @keyframes fadeRise {
      from {
        opacity: 0;
        transform: translateY(12px);
        filter: blur(4px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
        filter: blur(0);
      }
    }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      .container {
        padding: 1.5rem;
      }
      .top-rule {
        height: 40px;
        margin-bottom: 1.8rem;
      }
      .date-divider {
        width: 1.2rem;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .title, .top-rule, .fade-in {
        animation: none;
      }
      .title {
        -webkit-text-fill-color: var(--silver-2);
        background: none;
      }
    }
  </style>
</head>
<body>

  <canvas id="fireworks"></canvas>

  <div class="container">
    <div class="top-rule fade-in fade-in-1"></div>

    <h1 class="title fade-in fade-in-2">Silver Linings</h1>

    <div class="subtitle fade-in fade-in-3">An Anniversary Celebration</div>

    <p class="quote fade-in fade-in-4">
      Three hundred and sixty-four days are yours to command.<br>
      <span class="highlight">This one, however,</span> is reserved for us.
    </p>

    <div class="date-block fade-in fade-in-5">
      <div class="date-label">Save the Date</div>
      <div class="date-main">
        May<span class="date-divider"></span>31<span class="date-divider"></span>2026
      </div>
    </div>

    <div class="bottom-rule fade-in fade-in-6"></div>

    <div class="footer-text fade-in fade-in-7">
      Formal Invitation to Follow
    </div>
  </div>

  <script>
    (function() {
      // ──────────────────────────────────────────────
      //  AMBIENT FIREWORKS  —  Silver & Champagne
      // ──────────────────────────────────────────────
      const canvas = document.getElementById('fireworks');
      const ctx = canvas.getContext('2d');

      let W, H;
      const bursts = [];
      const sparkles = [];   // tiny floating ambient sparkles
      const MAX_BURSTS = 4;
      const PARTICLE_LIFE = 3.2;  // seconds

      function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
      }
      window.addEventListener('resize', resize);
      resize();

      // ── Color Palette ──
      const SILVERS = [
        { r: 240, g: 240, b: 248 },   // bright silver-white
        { r: 220, g: 220, b: 232 },   // soft silver
        { r: 200, g: 200, b: 214 },   // mid silver
        { r: 180, g: 180, b: 196 },   // deeper silver
      ];
      const CHAMPAGNES = [
        { r: 237, g: 224, b: 204 },   // champagne
        { r: 220, g: 200, b: 170 },   // warm champagne
        { r: 212, g: 197, b: 169 },   // muted champagne
      ];
      const GOLDS = [
        { r: 230, g: 200, b: 140 },   // soft gold
        { r: 210, g: 180, b: 120 },   // deeper gold
      ];

      function randomFrom(arr) {
        return arr[Math.floor(Math.random() * arr.length)];
      }

      function lerpColor(c1, c2, t) {
        return {
          r: c1.r + (c2.r - c1.r) * t,
          g: c1.g + (c2.g - c1.g) * t,
          b: c1.b + (c2.b - c1.b) * t,
        };
      }

      // ── Burst ──
      function spawnBurst() {
        const cx = W * 0.2 + Math.random() * W * 0.6;  // mostly in center 60%
        const cy = H * 0.15 + Math.random() * H * 0.5;  // upper half
        const count = 60 + Math.floor(Math.random() * 80);
        const palette = Math.random() < 0.6 ? SILVERS
                       : Math.random() < 0.7 ? CHAMPAGNES
                       : GOLDS;

        const particles = [];
        for (let i = 0; i < count; i++) {
          const angle = (Math.PI * 2 * i) / count + (Math.random() - 0.5) * 0.3;
          const speed = 40 + Math.random() * 180;
          const color = randomFrom(palette);
          const variant = {
            r: color.r + (Math.random() - 0.5) * 30,
            g: color.g + (Math.random() - 0.5) * 30,
            b: color.b + (Math.random() - 0.5) * 30,
          };
          particles.push({
            x: cx,
            y: cy,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            life: PARTICLE_LIFE * (0.5 + Math.random() * 0.5),
            maxLife: PARTICLE_LIFE,
            color: variant,
            size: 0.8 + Math.random() * 2.2,
            gravity: 15 + Math.random() * 30,
            drag: 0.96 + Math.random() * 0.03,
          });
        }
        bursts.push({ particles, age: 0 });
        // Cap bursts
        while (bursts.length > MAX_BURSTS) bursts.shift();
      }

      // ── Ambient Sparkle ──
      function spawnSparkle() {
        sparkles.push({
          x: Math.random() * W,
          y: Math.random() * H,
          life: 2 + Math.random() * 4,
          maxLife: 6,
          size: 0.5 + Math.random() * 1.5,
          twinkleSpeed: 0.03 + Math.random() * 0.07,
          twinkleOffset: Math.random() * Math.PI * 2,
        });
        if (sparkles.length > 40) sparkles.shift();
      }

      // ── Update ──
      function update(dt) {
        // Update burst particles
        for (let b = bursts.length - 1; b >= 0; b--) {
          const burst = bursts[b];
          burst.age += dt;
          for (let p = burst.particles.length - 1; p >= 0; p--) {
            const pt = burst.particles[p];
            pt.life -= dt;
            pt.vy += pt.gravity * dt;
            pt.vx *= pt.drag;
            pt.vy *= pt.drag;
            pt.x += pt.vx * dt;
            pt.y += pt.vy * dt;
            if (pt.life <= 0) {
              burst.particles.splice(p, 1);
            }
          }
          if (burst.particles.length === 0 || burst.age > PARTICLE_LIFE + 1) {
            bursts.splice(b, 1);
          }
        }

        // Update sparkles
        for (let s = sparkles.length - 1; s >= 0; s--) {
          sparkles[s].life -= dt;
          if (sparkles[s].life <= 0) sparkles.splice(s, 1);
        }
      }

      // ── Draw ──
      function draw() {
        ctx.clearRect(0, 0, W, H);

        // Draw bursts
        for (const burst of bursts) {
          for (const pt of burst.particles) {
            const alpha = Math.max(0, pt.life / pt.maxLife);
            const size = pt.size * (0.4 + alpha * 0.6);
            const fade = alpha * 0.8;

            // Glow
            const glow = ctx.createRadialGradient(pt.x, pt.y, 0, pt.x, pt.y, size * 3);
            glow.addColorStop(0, `rgba(${pt.color.r},${pt.color.g},${pt.color.b},${fade * 0.5})`);
            glow.addColorStop(0.5, `rgba(${pt.color.r},${pt.color.g},${pt.color.b},${fade * 0.15})`);
            glow.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = glow;
            ctx.beginPath();
            ctx.arc(pt.x, pt.y, size * 3, 0, Math.PI * 2);
            ctx.fill();

            // Core
            ctx.fillStyle = `rgba(${pt.color.r},${pt.color.g},${pt.color.b},${fade})`;
            ctx.beginPath();
            ctx.arc(pt.x, pt.y, size, 0, Math.PI * 2);
            ctx.fill();
          }
        }

        // Draw ambient sparkles
        for (const s of sparkles) {
          const twinkle = 0.3 + 0.7 * Math.abs(Math.sin(s.twinkleOffset + performance.now() * 0.001 * s.twinkleSpeed));
          const alpha = Math.max(0, s.life / s.maxLife) * twinkle * 0.5;
          ctx.fillStyle = `rgba(235,235,242,${alpha})`;
          ctx.beginPath();
          ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      // ── Spawn timers ──
      let burstTimer = 0;
      const BURST_INTERVAL_MIN = 2.5;  // seconds
      const BURST_INTERVAL_MAX = 6.0;

      let sparkleTimer = 0;
      const SPARKLE_INTERVAL = 0.3;

      function scheduleNextBurst() {
        burstTimer = BURST_INTERVAL_MIN + Math.random() * (BURST_INTERVAL_MAX - BURST_INTERVAL_MIN);
      }
      scheduleNextBurst();

      // Initial burst after a short delay
      setTimeout(() => {
        spawnBurst();
        scheduleNextBurst();
      }, 400);

      // ── Ambient floating dust particles (DOM) ──
      function spawnDustParticle() {
        const el = document.createElement('div');
        el.className = 'particle';
        const size = 1 + Math.random() * 3;
        const dur = 6 + Math.random() * 10;
        const delay = Math.random() * 3;
        el.style.cssText = `
          width: ${size}px;
          height: ${size}px;
          left: ${10 + Math.random() * 80}%;
          bottom: -10px;
          --dur: ${dur}s;
          --delay: ${delay}s;
        `;
        document.body.appendChild(el);
        setTimeout(() => el.remove(), (dur + delay) * 1000 + 500);
      }

      // ── Main Loop ──
      let lastTime = performance.now();
      function loop(time) {
        const dt = Math.min((time - lastTime) / 1000, 0.1);
        lastTime = time;

        // Burst timer
        burstTimer -= dt;
        if (burstTimer <= 0) {
          spawnBurst();
          scheduleNextBurst();
        }

        // Sparkle timer
        sparkleTimer -= dt;
        if (sparkleTimer <= 0) {
          spawnSparkle();
          sparkleTimer = SPARKLE_INTERVAL;
        }

        // Dust particles
        if (Math.random() < 0.15) spawnDustParticle();

        update(dt);
        draw();
        requestAnimationFrame(loop);
      }

      requestAnimationFrame(loop);
    })();
  </script>

</body>
</html>
